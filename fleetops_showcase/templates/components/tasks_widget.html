<!-- Tasks Widget Component -->
<!-- Usage: include 'components/tasks_widget.html' with tasks=tasks -->
{% load kwd_filters %}
<div class="bg-card-dark border border-border-dark rounded-2xl p-6">
    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
        <span>📋</span> My Tasks
    </h3>

    <!-- Add Task Form -->
    <form method="post" action="{% url 'task_add' %}" class="flex gap-2 mb-4">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Add a new task..." required
               class="flex-1 px-4 py-2.5 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent text-sm transition-colors">
        <button type="submit" class="px-4 py-2.5 bg-orange-500 hover:bg-orange-600 text-white rounded-lg text-sm font-semibold transition-colors">
            Add
        </button>
    </form>

    <!-- Task List -->
    <div class="space-y-2 max-h-64 overflow-y-auto">
        {% for task in tasks %}
        <div class="flex items-center justify-between p-3 rounded-xl {% if task.status == 'completed' %}bg-gray-800/50{% else %}bg-gray-800{% endif %} group">
            <div class="flex items-center gap-3">
                <form method="post" action="{% url 'task_toggle' task.pk %}">
                    {% csrf_token %}
                    <button type="submit" class="w-5 h-5 rounded border-2 flex items-center justify-center transition-colors
                        {% if task.status == 'completed' %}border-emerald-500 bg-emerald-500 text-white{% else %}border-gray-600 hover:border-orange-500{% endif %}">
                        {% if task.status == 'completed' %}
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                        {% endif %}
                    </button>
                </form>
                <span class="text-sm {% if task.status == 'completed' %}text-gray-500 line-through{% else %}text-gray-200{% endif %}">
                    {{ task.title }}
                </span>
            </div>
            <form method="post" action="{% url 'task_delete' task.pk %}">
                {% csrf_token %}
                <button type="submit" class="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </form>
        </div>
        {% empty %}
        <p class="text-sm text-gray-500 text-center py-4">No tasks yet. Add one above!</p>
        {% endfor %}
    </div>
</div>
